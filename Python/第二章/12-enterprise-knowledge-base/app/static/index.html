<!doctype html>
<html lang="zh-CN">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>企业知识库</title>
		<link rel="stylesheet" href="/styles.css" />
	</head>
	<body>
		<div class="shell">
			<header class="topbar">
				<div>
					<strong>Knowledge Hub</strong>
					<span>企业知识中台 Python 版</span>
				</div>
				<label>
					演示身份
					<select id="userSelect"></select>
				</label>
				<div id="health" class="health">检查中</div>
			</header>

			<main class="layout">
				<aside class="panel">
					<div class="panel-heading">
						<div>
							<span>KNOWLEDGE BASE</span>
							<h1>知识库</h1>
						</div>
						<button id="refreshDocuments">刷新</button>
					</div>
					<form id="documentForm" class="document-form">
						<input id="editingDocumentId" type="hidden" />
						<label>文档标题<input id="documentTitle" maxlength="120" required /></label>
						<label>归属部门<input id="departmentId" maxlength="64" value="customer-service" required /></label>
						<label>可见范围
							<select id="visibility">
								<option value="company">企业内公开</option>
								<option value="department">仅归属部门</option>
							</select>
						</label>
						<label>Markdown 文件<input id="documentFile" type="file" accept=".md,text/markdown" required /></label>
						<button type="submit">保存文档</button>
						<p id="saveMessage"></p>
					</form>
					<div id="documents" class="documents"></div>
				</aside>

				<section class="panel query-panel">
					<div class="panel-heading">
						<div>
							<span>AI RETRIEVAL</span>
							<h1>知识问答</h1>
						</div>
					</div>
					<div id="conversation" class="conversation">
						<div class="empty">选择身份并导入样例文档后，可以询问企业知识库。</div>
					</div>
					<form id="queryForm" class="composer">
						<textarea id="question" maxlength="1000" rows="3">3000 元退款需要人工审核吗？</textarea>
						<button type="submit">发送</button>
					</form>
				</section>
			</main>
		</div>
		<script src="/app.js"></script>
	</body>
</html>
